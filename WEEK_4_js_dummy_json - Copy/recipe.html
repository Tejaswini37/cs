<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background:
          linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.25)),
          url("images/img1.jpg") center/cover no-repeat;
      }
    </style>
  </head>

  <body>
    <div id="navbar"></div>

    <div class="container mt-4" id="recipeDetails"></div>

    <script src="js/utils.js"></script>
    <script src="js/navbar.js"></script>
    <!--<script src="js/dashboard.js"></script>-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      $(document).ready(function () {
        protectDashboard();
        loadNavbar();
        getRecipeDetails();

        function getId() {
          return new URLSearchParams(window.location.search).get("id");
        }

        function getRecipeDetails() {
          const id = getId();
          $.ajax({
            url: `https://dummyjson.com/recipes/${id}`,
            method: "GET",
            success: function (data) {
              display(data);
            },
            error: function () {
              $("#recipeDetails").html(
                "<p class='text-danger'>Failed to load recipe</p>",
              );
            },
          });
        }

        function display(recipe) {
          let html = `
        <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <div class="card p-3 p-md-4 mb-4 shadow-sm"
               style="background-color:rgb(206, 196, 181,0.75);">

            <div class="row">
              <div class="col-12 col-md-5 text-center mb-3">
                <img src="${recipe.image}" class="img-fluid rounded w-100" />
              </div>

              <div class="col-12 col-md-7">
                <h2 class="mb-3">${recipe.name}</h2>
                <p><strong>Cuisine:</strong> ${recipe.cuisine}</p>
                <p><strong>Difficulty:</strong> ${recipe.difficulty}</p>
                <p><strong>Calories:</strong> ${recipe.caloriesPerServing}</p>
                <p><strong>Rating:</strong> ⭐ ${recipe.rating}</p>
                <p class="mb-4"><strong>ReviewCount:</strong> ${recipe.reviewCount}</p>

                <button class="btn btn-success mt-5 w-100 addcart-btn"
                        data-id="${recipe.id}">
                  Add to Cart
                </button>
              </div>
            </div>

            <div class="mt-3">
              <h4>Ingredients</h4>
              <ul class="list-group">
                ${recipe.ingredients
                  .map(
                    (i) => `
                  <li class="list-group-item"
                      style="background-color:rgb(206, 196, 181,0.75);">
                    ${i}
                  </li>
                `,
                  )
                  .join("")}
              </ul>
            </div>

            <div class="mt-4">
              <h4>Instructions</h4>
              <ol class="list-group list-group-numbered">
                ${recipe.instructions
                  .map(
                    (i) => `
                  <li class="list-group-item"
                      style="background-color:rgb(206, 196, 181,0.75);">
                    ${i}
                  </li>
                `,
                  )
                  .join("")}
              </ol>
            </div>

          </div>
        </div>
      </div>
    `;

          $("#recipeDetails").html(html);
        }

        $(document).on("click", ".addcart-btn", function () {
          const id = $(this).data("id");

          let cart = JSON.parse(localStorage.getItem("cart")) || [];

          if (!cart.includes(id)) {
            cart.push(id);
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Added to cart");
          } else {
            alert("Already in cart");
          }
        });
      });
    </script>
  </body>
</html>
