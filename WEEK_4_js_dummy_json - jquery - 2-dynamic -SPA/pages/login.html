<div class="container vh-100 d-flex flex-column justify-content-center align-items-center text-center">

  <!-- Title -->
  <div class="mb-4">
    <h1 class="fw-bold display-4 text-light">CookBook</h1>
    <p class="text-light fs-5 fw-bold">
      Discover easy home-cooked recipes.
    </p>
  </div>

  <!-- Login Card -->
  <div class="card shadow border-0 p-4 rounded-4 w-100"
       style="max-width: 500px; background-color: rgba(172, 151, 171, 0.95)">

    <h3 class="text-center mb-3 text-dark">Login</h3>

    <!-- Username -->
    <div class="mb-3 text-start">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter username" />
      <div id="usernameError" class="text-danger small mt-1"></div>
    </div>

    <!-- Password -->
    <div class="mb-3 text-start">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password" />
      <div id="passwordError" class="text-danger small mt-1"></div>
    </div>

    <!-- Button -->
    <button id="loginBtn" class="btn w-100 text-white"
            style="background-color:#191918">
      Login
    </button>

    <!-- General Error -->
    <div id="loginError" class="text-danger mt-2 text-center"></div>

  </div>
</div>
