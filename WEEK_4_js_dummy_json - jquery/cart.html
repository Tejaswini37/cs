<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background:
          linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.3)),
          url("images/img1.jpg") center/cover no-repeat;
      }
    </style>
  </head>

  <body>
    <div id="navbar"></div>

    <div class="container mt-4">
      <h3 class="text-light">My Cart</h3>
      <div id="cartItems" class="row mt-3"></div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      $(document).ready(function () {
        protectDashboard();
        loadNavbar();
        loadCart();

        function loadCart() {
          const cart = JSON.parse(localStorage.getItem("cart")) || [];

          if (cart.length === 0) {
            $("#cartItems").html(
              "<h5 class='text-center text-light'>Cart is empty</h5>",
            );
            return;
          }

          // without promises, DOM updates for every request(multiple)
          /*let html = "";
          $("#cartItems").html("");
          cart.forEach((id) => {
            $.ajax({
              url: `https://dummyjson.com/recipes/${id}`,
              method: "GET",
              success: function (r) {
                html += `
                <div class="col-12 col-md-4 col-lg-3 mb-4">
        <div class="recipe-card card h-100 shadow-sm rounded-4" data-id="${r.id}" style="cursor:pointer">
          <img src="${r.image}" class="card-img-top rounded-top-4" style="height:200px; object-fit:cover;" />
          <div class="card-body rounded-bottom-4 d-flex flex-column" style="background-color:rgb(206, 196, 181,0.25)">
            <h5 class="card-title fw-bold mb-1">${r.name}</h5>
            <p class="fw-semibold mb-1">${r.cuisine}</p>
            <p class="fw-semibold mb-1">⭐ ${r.rating}</p>
            <button class="btn btn-danger mt-auto removeBtn" data-id="${r.id}">
              Remove
            </button>
          </div>
        </div>
      </div>`;
                $("#cartItems").html(html);
              },
              error: function (err) {
                console.log("error loading cart item", err);
              },
            });
          });*/

          // with promises -> (multiple api calls) but DOM updates after finishing all

          // craete an array of ajax requests
          const requests = cart.map((id) => {
            return $.ajax({
              url: `https://dummyjson.com/recipes/${id}`,
              method: "GET",
            });
          });

          // wait for all requests
          Promise.all(requests)
            .then((requests) => {
              let html = "";
              requests.forEach((r) => {
                html += `
          <div class="col-12 col-md-4 col-lg-3 mb-4">
            <div class="recipe-card card h-100 shadow-sm rounded-4"
                 data-id="${r.id}" style="cursor:pointer">

              <img src="${r.image}" class="card-img-top rounded-top-4"
                   style="height:200px; object-fit:cover;" />

              <div class="card-body d-flex flex-column"
                   style="background-color:rgb(206, 196, 181,0.25)">

                <h5 class="card-title fw-bold mb-1">${r.name}</h5>
                <p class="fw-semibold mb-1">${r.cuisine}</p>
                <p class="fw-semibold mb-1">⭐ ${r.rating}</p>

                <button class="btn btn-danger mt-auto removeBtn"
                        data-id="${r.id}">
                  Remove
                </button>

              </div>
            </div>
          </div>
        `;
              });
              $("#cartItems").html(html);
            })
            .catch((err) => {
              console.log("Error loading cart", err);
              $("#cartItems").html(
                "<p class='text-danger text-center'>failed to load cart</p>",
              );
            });
        }
        //recipe-detail
        $(document).on("click", ".recipe-card", function () {
          const id = $(this).data("id");
          location.href = `recipe.html?id=${id}`;
        });
        // remove
        $(document).on("click", ".removeBtn", function (e) {
          e.stopPropagation();
          // Stops event from going to parent (.recipe-card)

          const id = $(this).data("id");

          let cart = JSON.parse(localStorage.getItem("cart")) || [];
          cart = cart.filter((i) => i !== id);

          localStorage.setItem("cart", JSON.stringify(cart));

          loadCart();
        });
      });
    </script>
  </body>
</html>
