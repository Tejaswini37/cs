<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CookBook</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
      body {
        background: url("images/img1.jpg") center/cover no-repeat;
      }
    </style>
  </head>

  <body>
    <div
      class="container vh-100 d-flex flex-column justify-content-center align-items-center text-center"
    >
      <div class="text-center mb-4" style="margin-top: -70px">
        <h1 class="fw-bold display-4 text-light">CookBook</h1>
        <p class="text-light display-3 fs-5 fw-bold">
          Discover easy home-cooked recipes.
        </p>
      </div>

      <div
        class="card shadow border-0 p-4 rounded-4 w-100"
        style="max-width: 500px; background-color: rgba(172, 151, 171, 0.95)"
      >
        <h3 class="text-center mb-3 text-dark">Login</h3>

        <div class="mb-3 text-start">
          <label class="form-label">Username</label>
          <input
            type="text"
            placeholder="Enter username"
            id="username"
            class="form-control"
            required
          />
          <div id="usernameError" class="text-danger small mt-1"></div>
        </div>
        <div class="mb-3 text-start">
          <label class="form-label">Password</label>
          <input
            type="password"
            placeholder="Enter password"
            id="password"
            class="form-control"
            required
          />
          <div id="passwordError" class="text-danger small mt-1"></div>
        </div>

        <button
          id="loginBtn"
          type="button"
          class="btn w-100 text-white"
          style="background-color: #191918"
        >
          Login
        </button>
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
