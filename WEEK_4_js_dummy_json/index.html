<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CookBook</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      body{
        background: url('img1.jpg') center center/cover;
      }
    </style>
  </head>
  <body>
    
    <div
      class="container position-relative d-flex flex-column justify-content-center align-items-center vh-100 text-center"
    >
    <div class="text-center mb-4" style="margin-top: -70px;">
      <h1 class="fw-bold display-4 text-light">CookBook</h1>
      <p class="fs-5 text-light display-3 fw-bold">Discover easy home-cooked recipes.</p>
    </div>
      <div class="card shadow p-4 border-0 rounded-4 w-100" style="max-width:500px; background-color:rgba(172, 151, 171, 0.95);">
        <h3 class="text-center mb-3 text-dark">Login</h3>
        
        <div class="mb-3 text-start">
          <label class="form-label">Username</label>
          <input
            type="text"
            placeholder="Enter username"
            id="username"
            class="form-control"
            required
          />
          <div id="usernameError" class="text-danger small mt-1"></div>
        </div>
        <div class="mb-3 text-start">
          <label class="form-label">Password</label>
          <input
            type="password"
            placeholder="Enter password"
            id="password"
            class="form-control"
            required
          />
          <div id="passwordError" class="text-danger small mt-1"></div>
        </div>
        <button type="button" class="btn w-100 text-white" style="background-color:#191918;" onclick="login()">
          Login
        </button>
        <!-- </form> -->
        <!-- <div id="message" class="text-center mt-3 text-danger"></div> -->
      </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/utils.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      redirectIfLoggedIn();
    </script>
  </body>
</html>
