<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- <title>Bootstrap demo</title> -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      body {
        background:
          linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.25)),
          url("img1.jpg") center/cover no-repeat;
      }
    </style>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="navbar"></div>

    <div class="container mt-4" id="recipeDetails"></div>
    <div id="recipes" class="row mt-4"></div>

    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/navbar.js"></script>
    <script>
      protectDashboard();
      loadNavbar();
      // get id from params  -->
      function getId() {
        const params = new URLSearchParams(window.location.search);
        // console.log(params.get("id")); -->
        return params.get("id");
      }

      async function getRecipeDeatails() {
        const id = getId();
        try {
          const res = await fetch(`https://dummyjson.com/recipes/${id}`);
          const data = await res.json();
          display(data);
        } catch (error) {
          console.error(error);
          document.getElementById("recipeDetails").innerHTML =
            "<p class='text-danger'>failed to load recipe</p>";
        }
      }

      function display(recipe) {
        const container = document.getElementById("recipeDetails");

        container.innerHTML = `
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
        <div class="card p-3 p-md-4 mb-4 shadow-sm" style="background-color:rgb(206, 196, 181,0.75);">
            <div class="row">
                <div class="col-12 col-md-5 text-center mb-3">
                    <img src="${recipe.image}" class="img-fluid rounded w-100" />
                </div>
            
        
          <div class="col-12 col-md-7">
          <h2 class="mb-3">${recipe.name}</h2>
          <p><strong>Cuisine:</strong> ${recipe.cuisine}</p>
          <p><strong>Difficulty:</strong> ${recipe.difficulty}</p>
          <p><strong>Calories:</strong> ${recipe.caloriesPerServing}</p>
            <p><strong>Rating:</strong>⭐ ${recipe.rating}</p>
            <p class="mb-4"><strong>ReviewCount:</strong> ${recipe.reviewCount}</p>
            <button class="btn btn-success mt-5 w-100" onclick="addToCart(${recipe.id})">
                    Add to Cart
            </button>
          </div>
        </div>
        <div class="mt-3">
            <h4> Ingredients </h4>
            <ul class="list-group" >
                ${recipe.ingredients
                  .map((i) => `<li class="list-group-item" style="background-color:rgb(206, 196, 181,0.75);">${i}</li>`)
                  .join("")}
            </ul>
        </div>

        <div class="mt-4">
            <h4> Instructions</h4>
            <ol class="list-group list-group-numbered">
                ${recipe.instructions
                  .map((i) => `<li class="list-group-item" style="background-color:rgb(206, 196, 181,0.75);">${i}</li>`)
                  .join("")}
            </ol>
        </div>
    </div>
    </div>
    </div>
      `;
      }
      function addToCart(id){
        let cart=JSON.parse(localStorage.getItem("cart")) || [];

        if(!cart.includes(id)){
          cart.push(id);
          localStorage.setItem("cart",JSON.stringify(cart));
          alert("added to cart");
        }
        else alert("already in cart");
      }

      getRecipeDeatails();
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
