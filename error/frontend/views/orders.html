<div class="orders-container">
  <h2>My Orders</h2>

  <table border="1">
    <tr>
      <th>Order ID</th>
      <th>Total Amount</th>
      <th>Status</th>
      <th>Date</th>
    </tr>

    <tr ng-repeat="order in orders">
      <td>{{order.id}}</td>

      <td>{{order.total}}</td>

      <td>{{order.status}}</td>

      <td>{{order.created_at}}</td>
    </tr>
  </table>
</div>
