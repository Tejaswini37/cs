<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Weather App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container text-center mt-5">
      <h2 class="mb-4">Weather App</h2>

      <!-- input-->
      <div class="row justify-content-center mb-4">
        <input type="text" id="cityInput" class="form-control mb-2" placeholder="Enter city name">
        <button class="btn btn-primary w-100" onclick="getWeather()">
            Get Weather
        </button>
      </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-4">
            <div id="result" class="card shadow p-4 d-none"></div>
        </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
